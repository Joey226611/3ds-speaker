<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PC Listener</title>
</head>
<body>

<h1>PC Speaker</h1>
<button onclick="start()">Klik hier om speaker te activeren</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVGSWMm5GbhtjH95l8DJK0DkJgO1Zv04Q",
  authDomain: "ds-tts-experiment.firebaseapp.com",
  databaseURL: "https://ds-tts-experiment-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ds-tts-experiment",
  storageBucket: "ds-tts-experiment.firebasestorage.app",
  messagingSenderId: "2627176558",
  appId: "1:2627176558:web:02c824589f63eaf9a67e7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// unieke pc id maken
const pcId = "pc_" + Math.random().toString(36).substr(2,9);

function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "nl-NL";
  speechSynthesis.speak(speech);
}

function start(){
  alert("Deze PC is nu online!");

  // PC registreert zich als online
  db.ref("pcs/" + pcId).set(true);

  // luister naar nieuwe berichten
  db.ref("queue").on("child_added", snap => {

    // random kiezen of deze PC praat (30% kans)
    if(Math.random() < 0.3){
      const msg = snap.val().text;
      speak(msg);
    }

  });
}
</script>

</body>
</html>
