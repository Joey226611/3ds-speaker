<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>NEON CONTROL HUB v5</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#050816,#000);
  color:#00f5ff;
  display:flex;
  justify-content:center;
  padding:30px;
}

.card{
  width:600px;
  background:rgba(0,255,255,0.05);
  border:1px solid rgba(0,255,255,0.2);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 40px #00f5ff22;
}

h1{
  text-align:center;
  letter-spacing:4px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#0a0f1f;
  color:#00f5ff;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#00f5ff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00c8ff;
}

.grid{
  margin-top:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.pc{
  background:rgba(0,255,255,0.08);
  padding:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  font-size:13px;
}
</style>
</head>

<body>

<div class="card">
  <h1>⚡ CONTROL HUB</h1>

  <input id="msg" placeholder="Enter signal">

  <select id="sound">
    <option value="">No sound</option>
    <option value="beep">beep</option>
    <option value="pop">pop</option>
    <option value="alert">alert</option>
  </select>

  <button onclick="send()">TRANSMIT</button>

  <h3>🖥 ACTIVE NODES</h3>
  <div class="grid" id="pcs"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- 🔥 externe firebase file -->
<script src="firebase.js"></script>

<script>
const pcsDiv = document.getElementById("pcs");

// live pcs
db.ref("pcs").on("value", snap=>{
  const data = snap.val() || {};
  pcsDiv.innerHTML = "";

  Object.keys(data).forEach(id=>{
    const el = document.createElement("div");
    el.className = "pc";

    el.innerHTML = `
      <span>${id}</span>
      <input type="checkbox" checked data-id="${id}">
    `;

    pcsDiv.appendChild(el);
  });
});

// send
function send(){
  const text = document.getElementById("msg").value;
  const sound = document.getElementById("sound").value;

  const targets = [];
  document.querySelectorAll("input[type=checkbox]").forEach(cb=>{
    if(cb.checked) targets.push(cb.dataset.id);
  });

  db.ref("messages").push({
    text,
    sound,
    targets,
    time: Date.now()
  });

  alert("Signal sent 🚀");
}
</script>

</body>
</html>
