<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>PC Voice Control</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 16px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
  font-size: 18px;
  margin-bottom: 15px;
}

select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

select {
  background: #0f172a;
  color: white;
}

button {
  background: #38bdf8;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #0ea5e9;
}

.status {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.8;
}
</style>

</head>
<body>

<div class="card">
  <h1>🔊 PC Voice Control</h1>

  <button onclick="startSystem()">Start systeem</button>

  <select id="voiceSelect"></select>

  <button onclick="testVoice()">Test stem</button>

  <div class="status" id="status">Status: offline</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVGSWMm5GbhtjH95l8DJK0DkJgO1Zv04Q",
  authDomain: "ds-tts-experiment.firebaseapp.com",
  databaseURL: "https://ds-tts-experiment-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ds-tts-experiment",
  storageBucket: "ds-tts-experiment.firebasestorage.app",
  messagingSenderId: "2627176558",
  appId: "1:2627176558:web:02c824589f63eaf9a67e7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let voices = [];
let selectedVoice = 0;
let running = false;

const voiceSelect = document.getElementById("voiceSelect");
const status = document.getElementById("status");

// voices laden
speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();

  voiceSelect.innerHTML = "";
  voices.forEach((v, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = v.name + " (" + v.lang + ")";
    voiceSelect.appendChild(opt);
  });
};

// keuze opslaan
voiceSelect.onchange = () => {
  selectedVoice = voiceSelect.value;
};

// speak functie
function speak(text){
  if(!voices.length) return;

  const msg = new SpeechSynthesisUtterance(text);
  msg.voice = voices[selectedVoice];
  msg.lang = voices[selectedVoice].lang;
  speechSynthesis.speak(msg);
}

// test
function testVoice(){
  speak("Dit is een test van de geselecteerde stem");
}

// start systeem
function startSystem(){
  if(running) return;
  running = true;

  status.innerText = "Status: online";

  speak("Systeem gestart");

  // luisteren naar messages
  db.ref("queue").on("child_added", snap => {
    const data = snap.val();
    if(data && data.text){
      speak(data.text);
    }
  });

  // cleanup bot
  setInterval(() => {
    db.ref("queue").once("value", snap => {
      const now = Date.now();

      snap.forEach(child => {
        const d = child.val();
        if(d.time && now - d.time > 5000){
          child.ref.remove();
        }
      });
    });
  }, 3000);
}
</script>

</body>
</html>
