<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PC Speaker</title>
</head>
<body>

<h1>PC Speaker Ready</h1>
<button onclick="startSystem()">Start speaker</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVGSWMm5GbhtjH95l8DJK0DkJgO1Zv04Q",
  authDomain: "ds-tts-experiment.firebaseapp.com",
  databaseURL: "https://ds-tts-experiment-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ds-tts-experiment",
  storageBucket: "ds-tts-experiment.firebasestorage.app",
  messagingSenderId: "2627176558",
  appId: "1:2627176558:web:02c824589f63eaf9a67e7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let voicesLoaded = false;
let voices = [];

// wacht tot voices geladen zijn
speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();
  voicesLoaded = true;
  console.log("Voices geladen:", voices.length);
};

// spreek functie
function speak(text){
  if(!voicesLoaded){
    alert("Voices nog niet geladen, klik opnieuw!");
    return;
  }

  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "nl-NL";

  // kies eerste beschikbare stem
  speech.voice = voices[0];

  speechSynthesis.speak(speech);
}

// start systeem (na klik)
function startSystem(){

  // test geluid zodat browser audio unlockt
  speak("Speaker geactiveerd");

  alert("Deze PC luistert nu!");

  // luister naar nieuwe berichten
  db.ref("queue").on("child_added", snap => {
    const msg = snap.val().text;
    speak(msg);
  });

}
</script>

</body>
</html>
