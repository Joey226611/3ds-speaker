<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>VOICE NODE v5</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#000,#020617);
  color:#00ffcc;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:360px;
  background:rgba(0,255,200,0.05);
  border:1px solid rgba(0,255,200,0.2);
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 0 30px #00ffcc22;
}

select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#00ffcc;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <h2>💠 VOICE NODE</h2>

  <button onclick="start()">ACTIVATE</button>

  <select id="voices"></select>

  <button onclick="test()">TEST</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- 🔥 shared firebase -->
<script src="firebase.js"></script>

<script>
const pcId = "node_" + Math.random().toString(36).substr(2,8);

let voices = [];
let selected = 0;

const sel = document.getElementById("voices");

// voices
speechSynthesis.onvoiceschanged = ()=>{
  voices = speechSynthesis.getVoices();

  sel.innerHTML = "";
  voices.forEach((v,i)=>{
    const o = document.createElement("option");
    o.value = i;
    o.textContent = v.name;
    sel.appendChild(o);
  });
};

sel.onchange = ()=> selected = sel.value;

// speak
function speak(t){
  const m = new SpeechSynthesisUtterance(t);
  m.voice = voices[selected];
  speechSynthesis.speak(m);
}

// sound
function playSound(name){
  if(!name) return;
  const a = new Audio(`https://YOUR_GITHUB.github.io/SE/${name}.mp3`);
  a.play();
}

function start(){
  speak("node activated");

  db.ref("pcs/" + pcId).set({
    online:true,
    lastSeen:Date.now()
  });

  setInterval(()=>{
    db.ref("pcs/" + pcId).update({
      lastSeen:Date.now()
    });
  },4000);

  db.ref("messages").on("child_added", snap=>{
    const m = snap.val();
    if(!m) return;

    if(m.targets.includes(pcId)){
      playSound(m.sound);
      speak(m.text);
    }
  });

  // auto remove offline nodes
  setInterval(()=>{
    db.ref("pcs").once("value", snap=>{
      const now = Date.now();

      snap.forEach(p=>{
        const d = p.val();
        if(d.lastSeen && now - d.lastSeen > 8000){
          p.ref.remove();
        }
      });
    });
  },5000);

  window.addEventListener("beforeunload", ()=>{
    db.ref("pcs/" + pcId).remove();
  });
}

function test(){
  speak("test signal active");
}
</script>

</body>
</html>
