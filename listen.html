<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Voice Client</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  width:350px;
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  padding:20px;
  border-radius:18px;
  text-align:center;
}

select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  background:#38bdf8;
  font-weight:bold;
}

.status {
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>💻 Voice Client</h2>

  <button onclick="start()">Start</button>

  <select id="voices"></select>

  <button onclick="test()">Test voice</button>

  <div class="status" id="status">offline</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVGSWMm5GbhtjH95l8DJK0DkJgO1Zv04Q",
  authDomain: "ds-tts-experiment.firebaseapp.com",
  databaseURL: "https://ds-tts-experiment-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ds-tts-experiment",
  storageBucket: "ds-tts-experiment.firebasestorage.app",
  messagingSenderId: "2627176558",
  appId: "1:2627176558:web:02c824589f63eaf9a67e7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const pcId = "pc_" + Math.random().toString(36).substr(2,8);

let voices = [];
let selectedVoice = 0;

const sel = document.getElementById("voices");
const status = document.getElementById("status");

// voices load
speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();

  sel.innerHTML = "";
  voices.forEach((v,i)=>{
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = v.name + " (" + v.lang + ")";
    sel.appendChild(opt);
  });
};

sel.onchange = () => selectedVoice = sel.value;

// speak
function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  msg.voice = voices[selectedVoice];
  speechSynthesis.speak(msg);
}

// test
function test(){
  speak("Voice test active");
}

// start
function start(){
  status.innerText = "online";

  speak("Client connected");

  // register PC
  db.ref("pcs/" + pcId).set(true);

  // keep alive
  setInterval(()=>{
    db.ref("pcs/" + pcId).set(true);
  }, 5000);

  // listen messages
  db.ref("messages").on("child_added", snap=>{
    const msg = snap.val();

    if(!msg || !msg.text) return;

    if(msg.targets && msg.targets.includes(pcId)){
      speak(msg.text);
    }
  });

  // cleanup old messages
  setInterval(()=>{
    db.ref("messages").once("value", snap=>{
      const now = Date.now();

      snap.forEach(c=>{
        const d = c.val();
        if(d.time && now - d.time > 5000){
          c.ref.remove();
        }
      });
    });
  }, 3000);
}
</script>

</body>
</html>
