<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PC Speaker</title>
</head>
<body>

<h1>PC Speaker</h1>

<button onclick="startSystem()">Start speaker</button>
<br><br>

<select id="voiceSelect"></select>
<button onclick="testVoice()">Test stem</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVGSWMm5GbhtjH95l8DJK0DkJgO1Zv04Q",
  authDomain: "ds-tts-experiment.firebaseapp.com",
  databaseURL: "https://ds-tts-experiment-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ds-tts-experiment",
  storageBucket: "ds-tts-experiment.firebasestorage.app",
  messagingSenderId: "2627176558",
  appId: "1:2627176558:web:02c824589f63eaf9a67e7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let voices = [];
let voicesLoaded = false;
let selectedVoiceIndex = 0;

const select = document.getElementById("voiceSelect");

// voices laden
speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();
  voicesLoaded = true;

  select.innerHTML = "";

  voices.forEach((voice, index) => {
    const option = document.createElement("option");
    option.value = index;
    option.textContent = voice.name + " (" + voice.lang + ")";
    select.appendChild(option);
  });

  // opgeslagen voice terugzetten
  const saved = localStorage.getItem("voiceIndex");
  if(saved !== null){
    select.value = saved;
    selectedVoiceIndex = saved;
  }
};

// voice kiezen opslaan
select.onchange = () => {
  selectedVoiceIndex = select.value;
  localStorage.setItem("voiceIndex", selectedVoiceIndex);
};

function speak(text){
  if(!voicesLoaded){
    alert("Voices nog niet geladen!");
    return;
  }

  const speech = new SpeechSynthesisUtterance(text);
  speech.voice = voices[selectedVoiceIndex];
  speech.lang = voices[selectedVoiceIndex].lang;
  speechSynthesis.speak(speech);
}

// testknop
function testVoice(){
  speak("Dit is een test van de gekozen stem");
}

// start systeem
function startSystem(){
  speak("Speaker geactiveerd");

  alert("PC luistert nu naar berichten!");

  db.ref("queue").on("child_added", snap => {
    const msg = snap.val().text;
    speak(msg);
  });
}
</script>

</body>
</html>
